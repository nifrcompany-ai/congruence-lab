<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Настройки — Congruence Lab</title>
  <script src="js/ui-early.js"></script>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cl-shell cl-page-enter">
    <header class="cl-header">
      <div class="cl-header-inner glass">
        <a class="cl-logo" href="index.html"><span class="cl-logo-mark">CL</span></a>
        <button type="button" class="cl-nav-toggle" aria-label="Меню"><i class="fas fa-bars"></i></button>
        <nav class="cl-nav cl-nav-drawer"><a href="index.html">Главная</a><a href="settings.html" data-nav="settings">Настройки</a></nav>
      </div>
    </header>
    <h1>Настройки</h1>
    <div class="cl-card glass" style="max-width:520px">
      <label class="cl-label">Тема</label>
      <select id="set-theme" class="cl-select">
        <option value="dark">Тёмная</option>
        <option value="light">Светлая</option>
      </select>
      <label class="cl-label" style="margin-top:0.75rem">Язык (базовые фразы)</label>
      <select id="set-lang" class="cl-select">
        <option value="ru">Русский</option>
        <option value="en">English</option>
      </select>
      <label style="margin-top:0.75rem;display:flex;align-items:center;gap:0.5rem">
        <input type="checkbox" id="set-notify" checked> Уведомления-напоминания (если разрешены в браузере)
      </label>
      <label style="display:flex;align-items:center;gap:0.5rem">
        <input type="checkbox" id="set-sound"> Звук при достижении (короткий бип)
      </label>
      <label style="display:flex;align-items:center;gap:0.5rem">
        <input type="checkbox" id="set-particles" checked> Партиклы на фоне
      </label>
      <label class="cl-label" style="margin-top:0.75rem">Размер текста и элементов</label>
      <select id="set-ui-scale" class="cl-select">
        <option value="normal">Обычный</option>
        <option value="comfort">Крупный (если мало Windows 150–200%)</option>
        <option value="compact">Компактный</option>
      </select>
      <p class="cl-settings-hint">По умолчанию — обычный. Системный масштаб Windows меняется в «Параметры → Экран», здесь только размер внутри сайта.</p>
      <button type="button" id="set-save" class="grad-btn" style="margin-top:1rem">Сохранить</button>
    </div>
    <h2>Экспорт / импорт</h2>
    <button type="button" id="set-export-all" class="grad-btn">Скачать все cl_* ключи JSON</button>
    <p class="cl-label" style="margin-top:1rem">Импорт JSON (вставьте объект с ключами cl_*)</p>
    <textarea id="set-import-text" class="cl-textarea" rows="4" placeholder="{&quot;cl_settings&quot;:&quot;...&quot;}"></textarea>
    <button type="button" id="set-import" class="grad-btn" style="margin-top:0.5rem">Импортировать</button>
    <h2 style="margin-top:2rem;color:var(--danger)">Опасная зона</h2>
    <button type="button" id="set-clear" class="grad-btn" style="background:var(--danger);box-shadow:none">Очистить все данные</button>
  </div>
  <script src="data/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/export.js"></script>
  <script src="js/achievements.js"></script>
  <script src="js/app.js"></script>
  <script src="js/settings.js"></script>
  <script>
    CLApp.init({ active: 'settings' });
    CLSettings.init();
  </script>
</body>
</html>
